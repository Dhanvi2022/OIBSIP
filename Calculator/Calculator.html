<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <style>
         textarea{
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">

            <textarea rows="5" col="5"  id="inputs" readonly>
                </textarea>
    <hr>
        <div class="section">
             <button>C</button>
             <button>(</button>
             <button >)</button>
             <button>=</button>
        </div>
         <div class="section">
             <button >7</button>
             <button >8</button>
             <button >9</button>
             <button >*</button>
        </div>
         <div class="section">
             <button >4</button>
             <button >5</button>
             <button>6</button>
             <button >-</button>
        </div>
        <div class="section">
             <button >1</button>
             <button >2</button>
             <button >3</button>
             <button >+</button>
        </div>
         <div class="section">
             <button >0</button>
             <button >%</button>
             <button >/</button>
             <button >Back</button>
        </div>



    </div>
    
</body>
</html>
